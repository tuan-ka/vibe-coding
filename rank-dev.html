<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaopiz — Đánh giá năng lực AI (Dev) · Agentic SDLC / Kari</title>
<style>
  :root{
    --bg:#0f1320; --bg2:#161c2e; --card:#1c2438; --card2:#222c44;
    --line:#2c3650; --txt:#e7ecf6; --muted:#9aa6c2; --accent:#6c8cff;
    --accent2:#54e0c7; --good:#3ddc97; --bad:#ff6b81; --warn:#ffcc66;
    --mid:#ffb454; --lock:#4a5572; --code:#0c1020; --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:linear-gradient(180deg,#0d1018,#0f1320 40%,#10131d);color:var(--txt);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    line-height:1.6;min-height:100vh;}
  .wrap{max-width:940px;margin:0 auto;padding:18px 18px 90px}
  header.bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:14px 0 18px;border-bottom:1px solid var(--line);margin-bottom:22px;}
  header.bar h1{font-size:18px;margin:0}
  header.bar .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .spacer{flex:1}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:6px 12px;font-size:12.5px;color:var(--muted);white-space:nowrap}
  .pill b{color:var(--accent2)}
  button{font-family:inherit;cursor:pointer}
  .btn{background:var(--accent);color:#0b1020;border:none;border-radius:10px;
    padding:10px 16px;font-weight:700;font-size:14px;transition:.15s}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--accent)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.warn{background:var(--warn);color:#3a2c00}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .intro{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:24px}
  .intro h2{margin:0 0 8px;font-size:16px}
  .intro p{margin:6px 0;color:var(--muted);font-size:14px}
  .intro .rules{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .tag{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12.5px;color:var(--muted)}
  .scorerule{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:13px;color:var(--muted)}
  .scorerule b{color:var(--accent2)}
  /* roadmap */
  .roadmap{display:flex;flex-direction:column;gap:14px}
  .lvl{display:flex;gap:16px;align-items:stretch;background:var(--card);border:1px solid var(--line);
    border-radius:var(--r);padding:16px 18px;transition:.15s;overflow:hidden}
  .lvl.open{cursor:pointer}
  .lvl.open:hover{border-color:var(--accent);transform:translateY(-1px)}
  .lvl.locked{opacity:.55;filter:grayscale(.3)}
  .lvl.passed{border-color:var(--good)}
  .lvl .num{flex:0 0 56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:30px;background:var(--bg2);border:1px solid var(--line)}
  .lvl.passed .num{border-color:var(--good)}
  .lvl .body{flex:1;min-width:0}
  .lvl .t{font-weight:700;font-size:16px}
  .lvl .te{color:var(--muted);font-weight:500;font-size:13px;font-style:italic}
  .lvl .d{color:var(--muted);font-size:13px;margin-top:6px}
  .lvl .meta{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .badge{font-size:12px;padding:3px 9px;border-radius:999px;font-weight:700}
  .badge.lock{background:#2a3147;color:#aab4d0}
  .badge.pass{background:rgba(61,220,151,.16);color:var(--good)}
  .badge.todo{background:rgba(108,140,255,.16);color:var(--accent)}
  .badge.partial{background:rgba(255,204,102,.16);color:var(--warn)}
  .badge.leader{background:rgba(255,204,102,.18);color:var(--warn)}
  /* level page */
  .back{color:var(--muted);background:none;border:none;font-size:14px;padding:6px 0;margin-bottom:6px}
  .back:hover{color:var(--accent)}
  .lvl-head{display:flex;gap:16px;align-items:center;margin:6px 0 6px}
  .lvl-head .num{flex:0 0 60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-size:34px;background:var(--bg2);border:1px solid var(--line)}
  .lvl-head h2{margin:0;font-size:20px}
  .lvl-head .te{color:var(--muted);font-style:italic;font-size:14px}
  .factbox{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 4px}
  .fact{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12.5px;color:var(--muted);flex:1;min-width:200px}
  .fact b{color:var(--txt);display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent2);margin-bottom:2px}
  .section-label{display:flex;align-items:center;gap:8px;font-size:13px;text-transform:uppercase;
    letter-spacing:1px;color:var(--muted);margin:24px 0 12px}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}
  /* leader bar */
  .leader-bar{background:rgba(255,204,102,.1);border:1px solid var(--warn);border-radius:12px;
    padding:10px 14px;margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .leader-bar .lab{font-size:13px;color:var(--warn);font-weight:700}
  .jump{display:flex;gap:6px;flex-wrap:wrap}
  .jb{border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:8px;padding:5px 11px;font-size:13px;font-weight:700}
  .jb:hover{border-color:var(--warn)}
  .jb.cur{background:var(--warn);color:#3a2c00;border-color:var(--warn)}
  /* knowledge */
  details.know{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
  details.know[open]{border-color:var(--accent2)}
  details.know>summary{cursor:pointer;list-style:none;padding:14px 18px;font-weight:700;display:flex;align-items:center;gap:10px;font-size:15px}
  details.know>summary::-webkit-details-marker{display:none}
  details.know>summary .chev{transition:.2s;color:var(--accent2)}
  details.know[open]>summary .chev{transform:rotate(90deg)}
  .know-inner{padding:0 18px 16px}
  .lesson{border-top:1px solid var(--line);padding:13px 0}
  .lesson:first-child{border-top:none}
  .lesson h4{margin:0 0 6px;font-size:14px;color:var(--txt)}
  .lesson p{margin:0;color:var(--muted);font-size:13.5px;white-space:pre-line}
  .reslist{margin:6px 0 0;padding-left:18px}
  .reslist li{color:var(--muted);font-size:13px;margin:3px 0}
  .contrib{background:rgba(255,180,84,.1);border:1px solid var(--mid);border-radius:10px;padding:9px 12px;font-size:13px;color:#ffd9a8;margin-top:8px}
  .ex-cap{margin-top:10px;font-size:12px;color:var(--accent2);font-weight:700}
  pre{background:var(--code);border:1px solid var(--line);border-radius:10px;padding:12px 14px;overflow:auto;margin:6px 0 0}
  pre code{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:#cfe0ff;white-space:pre}
  /* checklist */
  .ck{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}
  .ck.good{border-color:rgba(61,220,151,.5)} .ck.mid{border-color:rgba(255,180,84,.5)} .ck.no{border-color:rgba(255,107,129,.35)}
  .ck .ckt{font-size:13.5px;margin-bottom:9px}
  .ck .ckb{display:flex;gap:7px;flex-wrap:wrap}
  .ck .ckb button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:700}
  .ck .ckb button.good.on{background:rgba(61,220,151,.18);border-color:var(--good);color:var(--good)}
  .ck .ckb button.mid.on{background:rgba(255,180,84,.18);border-color:var(--mid);color:var(--mid)}
  .ck .ckb button.no.on{background:rgba(255,107,129,.18);border-color:var(--bad);color:var(--bad)}
  /* questions */
  .q{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
  .q.done-ok{border-color:rgba(61,220,151,.5)} .q.done-no{border-color:rgba(255,107,129,.5)}
  .q .qn{font-size:12px;color:var(--accent);font-weight:800;letter-spacing:.5px}
  .q .qt{font-size:14px;margin:6px 0 12px;white-space:pre-line;font-weight:600}
  .opt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin:7px 0;cursor:pointer;transition:.12s;background:var(--code)}
  .opt:hover{border-color:var(--accent)}
  .opt.selected{border-color:var(--accent);background:rgba(108,140,255,.12)}
  .opt.correct{border-color:var(--good);background:rgba(61,220,151,.14)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,107,129,.12)}
  .opt.locked{cursor:default}
  .opt .mk{flex:0 0 22px;height:22px;border-radius:6px;background:var(--card2);display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--muted)}
  .opt.selected .mk{background:var(--accent);color:#0b1020}
  .opt.correct .mk{background:var(--good);color:#06281b}
  .opt.wrong .mk{background:var(--bad);color:#3a0410}
  .opt .ot{flex:1;font-size:13.5px}
  .expl{margin-top:10px;border-left:3px solid var(--accent2);padding:9px 12px;background:var(--bg2);
    border-radius:0 8px 8px 0;font-size:13px;color:#dbe4f7;white-space:pre-line;display:none}
  .expl.show{display:block}
  .expl b{color:var(--accent2)}
  .qbar{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
  /* footer */
  .scorebar{position:sticky;bottom:0;background:rgba(16,20,32,.92);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-top:20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .scorebar .stat{font-size:13.5px;color:var(--muted)}
  .scorebar .stat b{font-size:16px;color:var(--accent2)}
  .result{border-radius:var(--r);padding:16px 18px;margin-top:16px;font-size:14px;display:none}
  .result.show{display:block}
  .result.ok{background:rgba(61,220,151,.12);border:1px solid var(--good)}
  .result.no{background:rgba(255,107,129,.1);border:1px solid var(--bad)}
  .result.warn{background:rgba(255,204,102,.1);border:1px solid var(--warn)}
  .result h3{margin:0 0 6px}
  .result.ok h3{color:var(--good)} .result.no h3{color:var(--bad)} .result.warn h3{color:var(--warn)}
  .result ul{margin:6px 0;padding-left:20px} .result li{font-size:13.5px;margin:3px 0}
  .result .acts{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
  @media(max-width:560px){header.bar h1{font-size:15px}}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>

/* ============================== DATA (Khung Kaopiz · role Dev) ============================== */

  skills:["Viết prompt cơ bản để sinh code","Hiểu & tuân thủ 3-Attempt Rule","Dùng Kaopiz DevKit cơ bản (generate/review/iterate)","Hiểu Test-First (TDD cơ bản)","Hiểu Code Gate ≥8.0/10","Đọc & hiểu Spec để sinh code đúng","Chạy unit test & đọc kết quả"],

{
  id:3, code:"L3", name:"Proficient", emoji:"🥈", thinking:"Holistic view", time:"Tháng 2–6",
  role:"Tự chủ feature phức tạp; review Layer 2 cho peer; 4-layer review thuần thục; training trong dự án.",
  milestone:"Lead 1 module lớn + đóng góp ≥1 Skill lên Kari Hub.",

/* ============================== STATE ============================== */
const STORAGE_KEY = "kaopizDevCompetency.v1";
let state = loadState();
let currentLevelId = null;
let forceKnowledgeOpen = false;

function defaultState(){ return { unlockedLevel:1, leader:false, perLevel:{} }; }
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(STORAGE_KEY)); if(s&&s.perLevel){ if(typeof s.leader!=="boolean") s.leader=false; return s;} }catch(e){}
  return defaultState();
}
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function levelState(id){
  let ls=state.perLevel[id];
  if(!ls||!("checklist" in ls)){ ls={checklist:{},choices:{},checked:{},passed:ls&&ls.passed||false}; state.perLevel[id]=ls; }
  return ls;
}
function ckGood(id){ const ls=state.perLevel[id]; if(!ls) return 0; return Object.values(ls.checklist||{}).filter(v=>v==="good").length; }
function ckPct(id){ const lv=LEVELS.find(l=>l.id===id); return lv.checklist.length? ckGood(id)/lv.checklist.length : 0; }
function qzCorrect(id){ const lv=LEVELS.find(l=>l.id===id), ls=state.perLevel[id]; if(!ls) return 0;
  let c=0; lv.quiz.forEach((q,i)=>{ if(ls.checked&&ls.checked[i]&&ls.choices[i]===q.correct) c++; }); return c; }
function qzNeed(id){ const lv=LEVELS.find(l=>l.id===id); const ratio=lv.code==="L5"?0.9:QZ_PASS; return Math.ceil(ratio*lv.quiz.length); }
function isPassNow(id){ const lv=LEVELS.find(l=>l.id===id);
  return ckPct(id)>=CK_PASS && qzCorrect(id)>=qzNeed(id); }
function passedCount(){ return LEVELS.filter(l=>state.perLevel[l.id]&&state.perLevel[l.id].passed).length; }
function isUnlocked(id){ return state.leader || id<=state.unlockedLevel; }
function started(id){ const ls=state.perLevel[id]; if(!ls) return false;
  return Object.keys(ls.checklist||{}).length>0 || Object.keys(ls.choices||{}).length>0; }

/* ============================== DOM HELPER ============================== */
function h(tag, attrs, ...kids){
  const e=document.createElement(tag); attrs=attrs||{};
  for(const k in attrs){ const v=attrs[k]; if(v==null||v===false) continue;
    if(k==="class") e.className=v; else if(k==="html") e.innerHTML=v;
    else if(k.slice(0,2)==="on"&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v); }
  kids.flat().forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); });
  return e;
}

  const app=document.getElementById("app"); app.innerHTML="";

}

  else right.push(h("button",{class:"btn ghost sm",onclick:promptLeader},"👤 Leader"));
  right.push(h("button",{class:"btn ghost sm",onclick:resetProgress},"Reset"));

    h("div",{}, h("h1",{},"🛠 Kaopiz — Năng lực AI · "+ROLE),
      h("div",{class:"sub"},"Khung Agentic SDLC / Kari · Dreyfus 5 cấp · "+ROLE_SHIFT)),
    h("div",{class:"spacer"}), ...right);
}

function fillStat(el,id){
  const lv=LEVELS.find(l=>l.id===id);
  const ckp=Math.round(ckPct(id)*100), need=Math.round(CK_PASS*100);
  el.innerHTML="";
  el.appendChild(document.createTextNode("Checklist Thành thạo: "));
  el.appendChild(h("b",{},ckGood(id)+"/"+lv.checklist.length+" ("+ckp+"%)"));
  el.appendChild(document.createTextNode("  ·  Test đúng: "));
  el.appendChild(h("b",{},qzCorrect(id)+"/"+lv.quiz.length));
  el.appendChild(document.createTextNode("  — cần ≥"+need+"% checklist & ≥"+qzNeed(id)+"/"+lv.quiz.length+" test"));
}
function updateScoreBar(id){ const el=document.getElementById("scorestat"); if(el) fillStat(el,id); }

function ckCard(lv,i,item,ls){
  const v=ls.checklist[i];
  const card=h("div",{class:"ck"+(v?" "+v:"")});
  card.appendChild(h("div",{class:"ckt"},(i+1)+". "+item));
  const bar=h("div",{class:"ckb"});
  const defs=[["good","✅ Thành thạo"],["mid","🟡 Cần hỗ trợ"],["no","⬜ Chưa"]];
  const btns={};
  defs.forEach(([key,label])=>{
    const b=h("button",{class:key+(v===key?" on":"")},label);
    b.addEventListener("click",()=>{
      ls.checklist[i]=key; saveState();
      defs.forEach(([k2])=>{ btns[k2].className=k2+(k2===key?" on":""); });
      card.className="ck "+key; updateScoreBar(lv.id);
    });
    btns[key]=b; bar.appendChild(b);
  });
  card.appendChild(bar); return card;
}
function quizCard(lv,i,qq,ls){
  const checked=!!(ls.checked&&ls.checked[i]), chosen=ls.choices[i];
  const card=h("div",{class:"q"+(checked?(chosen===qq.correct?" done-ok":" done-no"):""),id:"q"+i});
  card.appendChild(h("div",{class:"qn"},"CÂU "+(i+1)));
  card.appendChild(h("div",{class:"qt"},qq.q));
  const optEls=[];
  qq.options.forEach((opt,oi)=>{
    let cls="opt";
    if(checked){ cls+=" locked"; if(oi===qq.correct) cls+=" correct"; else if(oi===chosen) cls+=" wrong"; }
    else if(chosen===oi) cls+=" selected";
    const row=h("div",{class:cls}, h("div",{class:"mk"}, checked&&oi===qq.correct?"✓":(checked&&oi===chosen?"✗":LETTER[oi])), h("div",{class:"ot"},opt));
    if(!checked) row.addEventListener("click",()=>{ ls.choices[i]=oi; saveState(); optEls.forEach((r,ri)=>{ r.className="opt"+(ri===oi?" selected":""); }); });
    optEls.push(row); card.appendChild(row);
  });
  const expl=h("div",{class:"expl"+(checked?" show":"")}, h("b",{},"Giải thích: "), qq.explanation);
  card.appendChild(expl);
  const checkBtn=h("button",{class:"btn ghost sm"}, checked?"✓ Đã kiểm tra":"Kiểm tra");
  if(checked) checkBtn.disabled=true; else checkBtn.addEventListener("click",()=>{
    if(ls.choices[i]==null){ checkBtn.textContent="⚠ Chọn một đáp án"; setTimeout(()=>checkBtn.textContent="Kiểm tra",1400); return; }
    ls.checked[i]=true; saveState(); const ch=ls.choices[i];
    optEls.forEach((r,ri)=>{ let c="opt locked"; if(ri===qq.correct) c+=" correct"; else if(ri===ch) c+=" wrong"; r.className=c; r.firstChild.textContent=ri===qq.correct?"✓":(ri===ch?"✗":LETTER[ri]); });
    expl.classList.add("show"); card.className="q "+(ch===qq.correct?"done-ok":"done-no");
    checkBtn.textContent="✓ Đã kiểm tra"; checkBtn.disabled=true; updateScoreBar(lv.id);
  });
  card.appendChild(h("div",{class:"qbar"}, checkBtn));
  return card;
}

/* ============================== ACTIONS ============================== */
function assess(id){
  const lv=LEVELS.find(l=>l.id===id), ls=levelState(id);
  const res=document.getElementById("result");
  const ckRated=Object.keys(ls.checklist).length, qAns=Object.keys(ls.choices).length;
  if(ckRated<lv.checklist.length || qAns<lv.quiz.length){
    res.className="result warn show"; res.innerHTML="";
    res.appendChild(h("h3",{},"⚠ Chưa hoàn tất"));
    res.appendChild(h("p",{},"Hãy tự đánh giá đủ "+lv.checklist.length+" mục checklist ("+ckRated+" đã làm) và chọn đủ "+lv.quiz.length+" câu test ("+qAns+" đã làm)."));
    res.scrollIntoView({behavior:"smooth",block:"center"}); return;
  }
  for(let i=0;i<lv.quiz.length;i++) ls.checked[i]=true;
  const ckOK=ckPct(id)>=CK_PASS, qzOK=qzCorrect(id)>=qzNeed(id), passed=ckOK&&qzOK;
  ls.passed=passed;
  if(passed) state.unlockedLevel=Math.max(state.unlockedLevel, Math.min(id+1, LEVELS.length));
  if(!passed) forceKnowledgeOpen=true;
  saveState(); render();
  showResult(id,ckOK,qzOK,passed);
}
function showResult(id,ckOK,qzOK,passed){
  const lv=LEVELS.find(l=>l.id===id), res=document.getElementById("result"); if(!res) return; res.innerHTML="";
  const ckp=Math.round(ckPct(id)*100);
  if(passed){
    res.className="result ok show";
    res.appendChild(h("h3",{},"🎉 Đạt "+lv.code+" "+lv.name+" (trong tool)"));
    res.appendChild(h("ul",{},
      h("li",{},"Checklist Thành thạo: "+ckp+"% ✓"),
      h("li",{},"Knowledge Test: "+qzCorrect(id)+"/"+lv.quiz.length+" ✓")));
    res.appendChild(h("p",{},"Để được công nhận CHÍNH THỨC còn cần: Practical Project (50%) + Peer & Mentor Review (30%)"+(lv.contribution.indexOf("BẮT BUỘC")>=0?" + Contribution bắt buộc của cấp này":"")+" — do Leader/Mentor verify."));
  }else{
    res.className="result no show";
    res.appendChild(h("h3",{},"Chưa đạt "+lv.code));
    res.appendChild(h("ul",{},
      h("li",{},"Checklist Thành thạo: "+ckp+"% "+(ckOK?"✓":"(cần ≥"+Math.round(CK_PASS*100)+"%)")),
      h("li",{},"Knowledge Test: "+qzCorrect(id)+"/"+lv.quiz.length+" "+(qzOK?"✓":"(cần ≥"+qzNeed(id)+")"))));
    res.appendChild(h("p",{},"Mở phần “Kiến thức · Khoá học” ở trên để xem cần học/làm gì cho các mục còn thiếu."));
  }
  const acts=h("div",{class:"acts"});
  if(passed && id<LEVELS.length) acts.appendChild(h("button",{class:"btn",onclick:()=>{currentLevelId=id+1;forceKnowledgeOpen=false;render();}},"→ Sang "+LEVELS[id].code));
  if(!passed) acts.appendChild(h("button",{class:"btn",onclick:()=>{const d=document.querySelector("details.know"); if(d){d.open=true; d.scrollIntoView({behavior:"smooth",block:"start"});}}},"📚 Tới phần kiến thức"));
  acts.appendChild(h("button",{class:"btn ghost",onclick:()=>{currentLevelId=null;render();}},"Về lộ trình"));
  res.appendChild(acts); res.scrollIntoView({behavior:"smooth",block:"center"});
}
function promptLeader(){ const p=prompt("Nhập PIN Leader/Manager:"); if(p==null) return; if(p===LEADER_PIN){ state.leader=true; saveState(); render(); } else alert("Sai PIN."); }
function exitLeader(){ state.leader=false; saveState(); render(); }
function leaderPass(id){ const ls=levelState(id); ls.passed=true; state.unlockedLevel=Math.max(state.unlockedLevel, Math.min(id+1, LEVELS.length)); saveState(); currentLevelId=id<LEVELS.length?id+1:null; forceKnowledgeOpen=false; render(); }
function resetProgress(){ if(!confirm("Xoá toàn bộ tiến độ, checklist và đáp án đã lưu? (Leader mode cũng tắt). Không hoàn tác.")) return; state=defaultState(); saveState(); currentLevelId=null; forceKnowledgeOpen=false; render(); }

/* ============================== INIT ============================== */
render();
</script>
